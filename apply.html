<!DOCTYPE html>
<html lang = "en">

<head>
    <style>
       /* Container styling */
form {
    width: 40%;
    margin: 60px auto;
    padding: 30px;
    border: 2px solid black;
    border-radius: 10px;
}

/* Make labels block elements so they sit above inputs */
label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
    font-weight: bold;
}

.name-row {
    display: grid;
    grid-template-columns: 1fr 1fr; /*Just like 50% and 50%*/
    gap: 20px; 
}

/* Style the text inputs, selects, and textareas */
input[type="text"],
input[type="email"],
input[type="date"],
textarea {
    width: 97%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

input[type="text"]:hover,
input[type="email"]:hover,
input[type="date"]:hover,
textarea:hover {
    background-color: lightblue;
}

select {
    width: 101%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}

select:hover {
    background-color: lightblue;
}

/* Fieldset styling for Gender and Skill */
fieldset {
    width: 95%;
    margin-top: 20px;
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 10px 15px;
}

fieldset:hover {
    background-color: lightblue;
}


.Skill {
    margin-bottom: -10px;
}

/* Inline labels for radios/checkboxes (they shouldn't be block level) */
fieldset label {
    display: inline-block;
    margin-top: 0;
    font-weight: normal;
}

/* Submit Button */
input[type="submit"] {
    background-color: darkblue;
    color: white;
    width: 100%;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 20px;
    font-size: 17px;
}

input[type="submit"]:hover {
    background-color: rgb(42, 42, 255);
    color: black;
}
    </style>
    <meta charset = "utf-8">
    <meta name="description" content="Job application form">
    <meta name="keywords" content="Job application, User information">
    <meta name="author" content="Joseph">
    <link href="layout.css" rel="stylesheet">
    <title> Job application form </title>
</head>
<body>
    <header>
            <div class="header-content">
                <a href="index.html" class="logo-link">
                    <img src="GameX_Studios_Logo.png" alt="GameX Studios Logo" class="logo">
                    <div class="brand-text">
                </a>
                <p class="slogan">Where Imaginations Turn Into Reality</p>
            </div>
            
            <nav aria-label="Main Navigation">
                <ul class="nav-menu">
                    <li><a href="index.html" aria-current="page">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="positions.html">Job Positions</a></li>
                    <li><a href="apply.html">Job Application</a></li>
                </ul>
            </nav>
        </header>

    <form method="post" action="https://mercury.swin.edu.au/it000000/formtest.php">
        <h1>Application form</h1>
        <label for="Job_ref_num">Job reference number</label>
        <input type="text" name="Job_ref_num" id="Job_ref_num" required pattern="[a-zA-z0-9]{5}">

        <div class="name-row">
            <div class="field">
                <label for="F_name">First name</label>
                <input type="text" name="F_name" id="F_name" required>
            </div>
            <div class="field">
                <label for="L_name">Last name</label>
                <input type="text" name="L_name" id="L_name" required>
            </div>
        </div>

        <label for="Date_birth">Date of birth</label>
        <input type="date" name="Date_birth" id="Date_birth" required><br>

        <fieldset>
            <legend><strong>Gender</strong></legend>
            <input type="radio" name="Gender" id="M" value="Male" required>
            <label for="M">Male</label>
            <input type="radio" name="Gender" id="F" value="Female">
            <label for="F">Female</label>
            <input type="radio" name="Gender" id="-" value="-">
            <label for="-">Prefer not to say</label>
        </fieldset>

        <label for="Street_add">Street address</label>
        <input type="text" name="Street_add" id="Street_add" required maxlength="40">
        <label for="Town">Suburb/Town</label>
        <input type="text" name="Suburb/town" id="Town" required maxlength="40">

        <label for="State">State</label>
        <select name="State" id="State" required>
            <option value="">Please Select</option>
            <option value="VIC">VIC</option>
            <option value="NSW">NSW</option>
            <option value="QLD">QLD</option>
            <option value="NT">NT</option>
            <option value="SA">SA</option>
            <option value="TAS">TAS</option>
            <option value="ACT">ACT</option>
        </select>

        <label for="Pcode">Postcode</label>
        <input type="text" name="Postcode" id="Pcode" required pattern="[0-9]{4}"><br>
        <label for="Email">Email</label>
        <input type="email" name="Email" id="Email" required>
        <label for="P_num">Phone number</label>
        <input type="text" name="P_num" id="P_num" required pattern="[0-9\-]{8,12}" placeholder="eg.012-3456789">
        <br>
        
        <fieldset class="Skill">
            <legend><strong>Skill</strong></legend>
            <input type="checkbox" name="Skill[]" id="Math_foun" value="Math foundation" checked >
            <label for="Math_foun">Mathematical foundations</label> 
            <input type="checkbox" name="Skill[]" id="Game_engine" value="Game engine proficiency" >
            <label for="Game_engine">Game engine proficiency</label>
            <input type="checkbox" name="Skill[]" id="S_thinking" value="Systemic Thinking" >
            <label for="S_thinking">Systemic Thinking</label><br>
            <input type="checkbox" name="Skill[]" id="Rapid_proto" value="Rapid Prototyping" >
            <label for="Rapid_proto">Rapid Prototyping</label>
            <input type="checkbox" name="Skill[]" id="Others" value=" and others..." >
            <label for="Others">Other skills</label>
        </fieldset>
        <br>
        <label>Other skills:<br>
            <textarea name="Other skills" rows="6" cols="33" Placeholder="Write your other skills here..."></textarea>
        </label>


        <input type="submit" value="Submit form" >
    </form>

    <footer>
            <div class="footer-grid">
                <div class="footer-info">
                    <p><strong>GameX Studios</strong></p>
                    <p>Kuala Lumpur, Selangor, Malaysia</p>
                </div>
                <div class="footer-links-container">
                    <ul class="footer-links">
                        <li><a href="https://github.com/GameXStudios">GitHub</a></li>
                        <li><a href="https://jira.GameXStudios.com">Jira</a></li>
                        <li><a href="mailto:info@GameXStudios.com">Contact Us</a></li>
                    </ul>
                </div>
            </div>
            <p class="copyright">&copy; 2026 GameX Studios. All rights reserved.</p>
        </footer>
</body>
</html>
